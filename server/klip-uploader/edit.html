<!DOCTYPE html>
<html lang="{{.D.Lang}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klip · {{.D.EditorTitle}}</title>
<meta name="theme-color" content="#5b6cff">
<meta name="robots" content="noindex">
<style>
  :root{ --bg:#f4f5f7; --card:#fff; --ink:#1d2230; --sub:#6b7280; --line:#e6e8ec;
         --brand:#5b6cff; --brand2:#7a5cf0; --ok:#16a34a; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#15171d; --card:#1d2129; --ink:#e9eaee; --sub:#9aa0ab; --line:#2a2f3a; }
  }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 -apple-system,system-ui,"Segoe UI",sans-serif;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 18px;}
  header{position:sticky;top:0;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);z-index:5;}
  .hbar{display:flex;align-items:center;gap:12px;height:56px;}
  .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--ink);text-decoration:none;}
  .logo img{width:28px;height:28px;border-radius:7px}
  .spacer{flex:1}
  .ghost{border:1px solid var(--line);background:transparent;color:var(--ink);font-weight:600;
    font-size:12.5px;padding:7px 12px;border-radius:9px;cursor:pointer;text-decoration:none;}
  /* toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:16px 0 10px;}
  .tool{min-width:38px;height:38px;padding:0 9px;border-radius:9px;border:1px solid var(--line);background:var(--card);
    color:var(--ink);font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
  .tool:hover{border-color:var(--brand)}
  .tool.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .sep{width:1px;height:26px;background:var(--line);margin:0 4px}
  .swatch{width:24px;height:24px;border-radius:6px;border:2px solid var(--line);cursor:pointer;padding:0}
  .swatch.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--brand)}
  /* canvas stage */
  .stage{display:flex;justify-content:center;margin:6px 0 14px;}
  .canvas-host{max-width:100%;border-radius:12px;box-shadow:0 14px 40px rgba(20,25,40,.18);overflow:hidden;
    background:repeating-conic-gradient(#e9ebef 0% 25%,#f4f5f7 0% 50%) 50%/22px 22px;line-height:0;}
  /* fabric controla el tamaño en CSS (setDimensions cssOnly); no forzamos height aquí. */
  .canvas-host .canvas-container{max-width:100%;}
  .canvas-host canvas{display:block;}
  /* export bar */
  .exports{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:6px 0 24px;}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);
    color:var(--ink);font-weight:600;font-size:13px;padding:9px 14px;border-radius:10px;cursor:pointer;text-decoration:none;}
  .btn:hover{border-color:var(--brand)}
  .btn.primary{background:var(--ink);color:var(--bg);border-color:var(--ink);}
  .btn.brand{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border:none;}
  .btn[disabled]{opacity:.55;cursor:default}
  .hint{color:var(--sub);font-size:12px;text-align:center;margin:0 0 8px}
  .newlink{display:none;max-width:620px;margin:0 auto 24px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;align-items:center;gap:10px;}
  .newlink.show{display:flex}
  .newlink input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--bg);color:var(--ink);font:12.5px ui-monospace,monospace}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
    padding:9px 14px;border-radius:10px;font-size:12.5px;display:none;gap:8px;align-items:center;
    box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:20}
  .toast.show{display:flex}
</style>
</head>
<body>

<header><div class="wrap hbar">
  <a class="logo" href="{{.BaseURL}}"><img src="{{.LogoURL}}" alt="Klip"> Klip</a>
  <span class="spacer"></span>
  <a class="ghost" href="{{.BaseURL}}/{{.Slug}}">← {{.Slug}}</a>
</div></header>

<div class="wrap">
  <div class="toolbar" id="toolbar">
    <button class="tool on" data-tool="select" title="Seleccionar">➤</button>
    <button class="tool" data-tool="arrow" title="{{.D.ToolArrow}}">↗</button>
    <button class="tool" data-tool="rect" title="{{.D.ToolRect}}">▭</button>
    <button class="tool" data-tool="ellipse" title="{{.D.ToolEllipse}}">◯</button>
    <button class="tool" data-tool="line" title="{{.D.ToolLine}}">⎯</button>
    <button class="tool" data-tool="text" title="{{.D.ToolText}}">T</button>
    <button class="tool" data-tool="highlight" title="{{.D.ToolHighlight}}">🖍</button>
    <button class="tool" data-tool="number" title="{{.D.ToolNumber}}">①</button>
    <button class="tool" data-tool="blur" title="{{.D.ToolBlur}}">🌫</button>
    <span class="sep"></span>
    <button class="swatch on" data-color="#ff3b5b" style="background:#ff3b5b" title="Rojo"></button>
    <button class="swatch" data-color="#ffd23f" style="background:#ffd23f" title="Amarillo"></button>
    <button class="swatch" data-color="#34d399" style="background:#34d399" title="Verde"></button>
    <button class="swatch" data-color="#5b6cff" style="background:#5b6cff" title="Azul"></button>
    <button class="swatch" data-color="#1d2230" style="background:#1d2230" title="Negro"></button>
    <span class="sep"></span>
    <button class="tool" id="undoBtn" title="{{.D.Undo}}">↶</button>
    <button class="tool" id="clearBtn" title="{{.D.Clear}}">🗑</button>
  </div>

  <div class="stage">
    <div class="canvas-host"><canvas id="c"></canvas></div>
  </div>

  <p class="hint" id="hint"></p>

  <div class="exports">
    <button class="btn primary" id="dlBtn"><span>⬇</span> {{.D.Download}}</button>
    <button class="btn" id="copyBtn"><span>⧉</span> {{.D.CopyImage}}</button>
    <button class="btn brand" id="upBtn"><span>↩</span> {{.D.UploadBack}}</button>
  </div>

  <div class="newlink" id="newlink">
    <span>🔗</span>
    <input id="newlinkInput" readonly>
    <button class="btn" id="copyNewBtn">⧉ {{.D.CopyLink}}</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="{{.FabricURL}}"></script>
<script>
  // ---- i18n strings (auto-escapados por html/template en contexto JS) ----
  var T = {
    arrow: {{.D.ToolArrow}}, rect: {{.D.ToolRect}}, ellipse: {{.D.ToolEllipse}},
    line: {{.D.ToolLine}}, text: {{.D.ToolText}}, highlight: {{.D.ToolHighlight}},
    number: {{.D.ToolNumber}}, blur: {{.D.ToolBlur}},
    imageCopied: {{.D.ImageCopied}}, imgUnsupported: {{.D.CopyImgUnsupported}},
    uploading: {{.D.Uploading}}, newLinkReady: {{.D.NewLinkReady}}, uploadFailed: {{.D.UploadFailed}},
    linkCopied: {{.D.LinkCopied}}
  };
  var IMAGE_URL = {{.ImageURL}};
  var UPLOAD_URL = {{.UploadURL}};

  function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = '✓ ' + msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  // ---- estado del editor ----
  var canvas = new fabric.Canvas('c', { selection: true, preserveObjectStacking: true });
  var tool = 'select';
  var color = '#ff3b5b';
  var numberSeq = 1;
  // pila de fondos para deshacer el blur (objetos sí salen de canvas._objects)
  var STROKE = 4;

  // Resolución NATIVA de la imagen: el backstore del canvas se mantiene a este tamaño (export en
  // calidad completa); solo el tamaño EN PANTALLA se escala de forma responsive.
  var nativeW = 900, nativeH = 500;

  // Carga la imagen de fondo a tamaño nativo; el canvas toma sus dimensiones.
  fabric.Image.fromURL(IMAGE_URL, function(img){
    nativeW = img.width || 900; nativeH = img.height || 500;
    canvas.setWidth(nativeW); canvas.setHeight(nativeH);
    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
      originX:'left', originY:'top', left:0, top:0
    });
    fitToHost();
  }, { crossOrigin: 'anonymous' });

  // Ajuste responsive: escala el tamaño EN CSS del canvas Y su contenedor con setDimensions(cssOnly),
  // así no queda espacio vacío debajo y el mapeo del puntero sigue correcto. El backstore (resolución
  // real para exportar) no cambia. Se adapta al ancho disponible (pantallas chicas / móvil incluidas).
  function fitToHost(){
    var host = document.querySelector('.canvas-host');
    var avail = host.parentElement.clientWidth;            // ancho disponible del contenedor
    var scale = Math.min(1, avail / nativeW);              // nunca agranda más allá del nativo
    canvas.setDimensions({ width: Math.round(nativeW*scale), height: Math.round(nativeH*scale) },
                         { cssOnly: true });
    canvas.calcOffset();                                   // recalcula offset para clics correctos
  }
  window.addEventListener('resize', fitToHost);
  window.addEventListener('orientationchange', fitToHost); // rotación en móvil

  // ---- selección de herramienta y color ----
  document.getElementById('toolbar').addEventListener('click', function(e){
    var tb = e.target.closest('.tool');
    if(tb && tb.dataset.tool){
      setTool(tb.dataset.tool, tb);
      return;
    }
    var sw = e.target.closest('.swatch');
    if(sw){
      color = sw.dataset.color;
      document.querySelectorAll('.swatch').forEach(function(s){ s.classList.remove('on'); });
      sw.classList.add('on');
    }
  });
  function setTool(t, btn){
    tool = t;
    document.querySelectorAll('.tool[data-tool]').forEach(function(b){ b.classList.remove('on'); });
    if(btn) btn.classList.add('on');
    var drawing = (t !== 'select' && t !== 'text' && t !== 'number');
    canvas.isDrawingMode = (t === 'highlight');
    if(t === 'highlight'){
      canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
      canvas.freeDrawingBrush.color = hexToRgba(color, 0.35);
      canvas.freeDrawingBrush.width = 22;
    }
    canvas.selection = (t === 'select');
    canvas.forEachObject(function(o){ o.selectable = (t === 'select'); });
    document.getElementById('hint').textContent = hintFor(t);
  }
  function hintFor(t){
    switch(t){
      case 'arrow': case 'rect': case 'ellipse': case 'line': case 'blur':
        return '↳ ' + (t==='blur'?T.blur:'') + ' — arrastra para dibujar';
      case 'text': return '↳ ' + T.text + ' — clic para escribir';
      case 'number': return '↳ ' + T.number + ' — clic para colocar';
      case 'highlight': return '↳ ' + T.highlight + ' — arrastra libremente';
      default: return '';
    }
  }

  // ---- dibujo con arrastre (rect/ellipse/line/arrow/blur) ----
  var dragShape = null, startX = 0, startY = 0, blurRect = null;
  canvas.on('mouse:down', function(opt){
    var p = canvas.getPointer(opt.e);
    if(tool === 'text'){ addText(p); return; }
    if(tool === 'number'){ addNumber(p); return; }
    if(['rect','ellipse','line','arrow','blur'].indexOf(tool) < 0) return;
    startX = p.x; startY = p.y;
    if(tool === 'rect' || tool === 'blur'){
      dragShape = new fabric.Rect({ left:startX, top:startY, width:1, height:1,
        fill:'rgba(0,0,0,0)', stroke: tool==='blur' ? hexToRgba('#5b6cff',0.9) : color,
        strokeWidth: tool==='blur'?2:STROKE, strokeDashArray: tool==='blur'?[6,4]:null,
        selectable:false, objectCaching:false });
    } else if(tool === 'ellipse'){
      dragShape = new fabric.Ellipse({ left:startX, top:startY, rx:1, ry:1,
        fill:'rgba(0,0,0,0)', stroke:color, strokeWidth:STROKE, selectable:false, objectCaching:false });
    } else { // line / arrow
      dragShape = new fabric.Line([startX,startY,startX,startY], { stroke:color, strokeWidth:STROKE, selectable:false });
    }
    canvas.add(dragShape);
  });
  canvas.on('mouse:move', function(opt){
    if(!dragShape) return;
    var p = canvas.getPointer(opt.e);
    if(tool === 'rect' || tool === 'blur'){
      dragShape.set({ left:Math.min(startX,p.x), top:Math.min(startY,p.y),
        width:Math.abs(p.x-startX), height:Math.abs(p.y-startY) });
    } else if(tool === 'ellipse'){
      dragShape.set({ left:Math.min(startX,p.x), top:Math.min(startY,p.y),
        rx:Math.abs(p.x-startX)/2, ry:Math.abs(p.y-startY)/2 });
    } else {
      dragShape.set({ x2:p.x, y2:p.y });
    }
    canvas.renderAll();
  });
  canvas.on('mouse:up', function(){
    if(!dragShape) return;
    var shape = dragShape; dragShape = null;
    if(tool === 'blur'){
      var r = { left:shape.left, top:shape.top, width:shape.width, height:shape.height };
      canvas.remove(shape);
      applyRegionBlur(r);
      return;
    }
    if(tool === 'arrow'){
      // convierte la línea en grupo línea+punta de flecha
      canvas.remove(shape);
      addArrow(shape.x1, shape.y1, shape.x2, shape.y2);
      return;
    }
    shape.set({ selectable:true });
    canvas.setActiveObject(shape);
    canvas.renderAll();
  });

  function addText(p){
    var t = new fabric.IText('Texto', { left:p.x, top:p.y, fill:color, fontSize:28,
      fontFamily:'-apple-system,system-ui,sans-serif', fontWeight:'600' });
    canvas.add(t); canvas.setActiveObject(t); t.enterEditing(); t.selectAll();
    canvas.renderAll();
  }
  function addNumber(p){
    var n = numberSeq++;
    var circle = new fabric.Circle({ radius:16, fill:color, originX:'center', originY:'center' });
    var label = new fabric.Text(String(n), { fill:'#fff', fontSize:18, fontWeight:'700',
      originX:'center', originY:'center', fontFamily:'-apple-system,sans-serif' });
    var g = new fabric.Group([circle,label], { left:p.x, top:p.y, originX:'center', originY:'center' });
    canvas.add(g); canvas.setActiveObject(g); canvas.renderAll();
  }
  function addArrow(x1,y1,x2,y2){
    var line = new fabric.Line([x1,y1,x2,y2], { stroke:color, strokeWidth:STROKE });
    var angle = Math.atan2(y2-y1, x2-x1);
    var head = 16;
    var tri = new fabric.Triangle({ left:x2, top:y2, originX:'center', originY:'center',
      width:head, height:head, fill:color, angle:(angle*180/Math.PI)+90 });
    var g = new fabric.Group([line,tri]);
    canvas.add(g); canvas.setActiveObject(g); canvas.renderAll();
  }

  // ---- BLUR DE REGIÓN: crop -> pixelar -> overlay (NO filtro blur global) ----
  function applyRegionBlur(r){
    if(r.width < 6 || r.height < 6) return;
    // 1) Recorta la región del lienzo renderizado (fondo + objetos previos).
    var src = canvas.toCanvasElement(1, { left:r.left, top:r.top, width:r.width, height:r.height });
    // 2) Pixela: dibuja a baja resolución y reescala sin suavizado.
    var down = Math.max(1, Math.round(Math.min(r.width, r.height) / 12)); // ~12px de bloque
    var dw = Math.max(1, Math.round(r.width / down));
    var dh = Math.max(1, Math.round(r.height / down));
    var tmp = document.createElement('canvas'); tmp.width = dw; tmp.height = dh;
    var tctx = tmp.getContext('2d'); tctx.imageSmoothingEnabled = false;
    tctx.drawImage(src, 0, 0, dw, dh);
    var out = document.createElement('canvas'); out.width = r.width; out.height = r.height;
    var octx = out.getContext('2d'); octx.imageSmoothingEnabled = false;
    octx.drawImage(tmp, 0, 0, dw, dh, 0, 0, r.width, r.height);
    // 3) Pega el bloque pixelado como objeto fabric encima, en su posición.
    var pix = new fabric.Image(out, { left:r.left, top:r.top, selectable:true });
    canvas.add(pix); canvas.setActiveObject(pix); canvas.renderAll();
  }

  // ---- deshacer / limpiar ----
  document.getElementById('undoBtn').addEventListener('click', function(){
    var objs = canvas.getObjects();
    if(objs.length){ canvas.remove(objs[objs.length-1]); canvas.renderAll(); }
  });
  document.getElementById('clearBtn').addEventListener('click', function(){
    canvas.getObjects().slice().forEach(function(o){ canvas.remove(o); });
    numberSeq = 1; canvas.renderAll();
  });

  // ---- export (retina-safe, re-rasteriza) ----
  function exportDataURL(){
    canvas.discardActiveObject(); canvas.renderAll();
    return canvas.toDataURL({ format:'png', multiplier:2 });
  }
  function dataURLtoBlob(dataURL){
    var parts = dataURL.split(','), mime = parts[0].match(/:(.*?);/)[1];
    var bstr = atob(parts[1]), n = bstr.length, u8 = new Uint8Array(n);
    while(n--){ u8[n] = bstr.charCodeAt(n); }
    return new Blob([u8], { type:mime });
  }

  document.getElementById('dlBtn').addEventListener('click', function(){
    var a = document.createElement('a');
    a.href = exportDataURL(); a.download = 'klip-anotada.png';
    document.body.appendChild(a); a.click(); a.remove();
  });
  document.getElementById('copyBtn').addEventListener('click', async function(){
    try{
      var blob = dataURLtoBlob(exportDataURL());
      await navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ]);
      toast(T.imageCopied);
    }catch(e){ toast(T.imgUnsupported); }
  });
  document.getElementById('upBtn').addEventListener('click', async function(){
    var btn = this; btn.disabled = true; btn.textContent = '… ' + T.uploading;
    try{
      var blob = dataURLtoBlob(exportDataURL());
      var fd = new FormData();
      fd.append('file', blob, 'klip-anotada.png');
      var resp = await fetch(UPLOAD_URL, { method:'POST', body: fd });
      if(!resp.ok) throw new Error('http '+resp.status);
      var j = await resp.json();
      // El backend devuelve el PNG crudo (…/slug.png). Compartimos la PÁGINA VESTIDA (…/slug):
      // logo, métricas, OCR, botones y OG cards. Quitamos la extensión para obtener esa URL.
      var link = (j.url || '').replace(/\.png$/i, '');
      var box = document.getElementById('newlink');
      document.getElementById('newlinkInput').value = link;
      box.classList.add('show');
      try{ await navigator.clipboard.writeText(link); }catch(_){}
      toast(T.newLinkReady);
    }catch(e){ toast(T.uploadFailed); }
    finally{ btn.disabled = false; btn.innerHTML = '<span>↩</span> ' + {{.D.UploadBack}}; }
  });
  document.getElementById('copyNewBtn').addEventListener('click', function(){
    var v = document.getElementById('newlinkInput').value;
    navigator.clipboard.writeText(v).then(function(){ toast(T.linkCopied); });
  });

  // ---- util ----
  function hexToRgba(hex, a){
    var h = hex.replace('#','');
    var r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }
</script>
</body>
</html>
